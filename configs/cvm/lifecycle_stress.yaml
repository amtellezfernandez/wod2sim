schema: cvm_experiment_config_v1
name: lifecycle_stress
description: Service-level lifecycle stress using deterministic duplicate-close and late-message schedules.
scene_manifest: artifacts/cvm/manifests/scene_manifest.yaml
policies:
  - constant_velocity
seeds: [17]
adapter_configs:
  - full_lifecycle_hardening
  - strict_or_pre_hardening_behavior
execution:
  mode: synthetic_lifecycle_harness
  expected_runs: 40
  cycles_per_config: 20
  fault_schedule:
    - lifecycle.duplicate_close
    - lifecycle.late_image
    - lifecycle.late_egomotion
    - lifecycle.late_route
claim_boundary:
  synthetic_service_harness: true
  benchmark_claim: false
