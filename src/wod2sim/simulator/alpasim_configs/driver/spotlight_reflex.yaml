# Should be used in AlpaSim, e.g.
#   driver=spotlight_reflex

defaults:
  - _self_

log_level: ${wizard.log_level}

model:
  model_type: spotlight_reflex
  checkpoint_path: "unused-zero-shot-reflex"
  device: "cpu"

host: "0.0.0.0"
port: 6789

inference:
  use_cameras:
    - camera_front_wide_120fov
  max_batch_size: 1
  subsample_factor: 1
  context_length: 1
  output_frequency_hz: 4

route:
  default_command: 2
  use_waypoint_commands: true
  command_distance_threshold: 2.0
  min_lookahead_distance: 20.0

output_dir: "/mnt/output/driver"

trajectory_optimizer:
  enabled: false

plot_debug_images: false
