# Should be used in AlpaSim, e.g.
#   driver=alpamayo_1_5_front

defaults:
  - _self_

log_level: ${wizard.log_level}

model:
  model_type: alpamayo1_5
  checkpoint_path: "/home/amdev/.cache/huggingface/hub/models--nvidia--Alpamayo-1.5-10B/snapshots/f11cd25b758ab560114019b555dde2a8b92d88b4"
  device: "cuda"
  use_classifier_free_guidance_nav: false

host: "0.0.0.0"
port: 6789

inference:
  use_cameras:
    - camera_front_wide_120fov
  max_batch_size: 1
  subsample_factor: 1
  context_length: 4
  output_frequency_hz: 10

route:
  default_command: 2
  use_waypoint_commands: true
  command_distance_threshold: 2.0
  min_lookahead_distance: 20.0

output_dir: "/mnt/output/driver"

trajectory_optimizer:
  enabled: false

plot_debug_images: false
