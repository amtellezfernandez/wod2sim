<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="430" viewBox="0 0 1280 430" role="img" aria-labelledby="title desc">
  <title id="title">WOD2Sim hero image</title>
  <desc id="desc">A visual overview of WOD-style policies flowing into AlpaSim closed-loop evidence.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#071318"/>
      <stop offset="0.48" stop-color="#0d2f34"/>
      <stop offset="1" stop-color="#183b32"/>
    </linearGradient>
    <linearGradient id="lane" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#40e0c6"/>
      <stop offset="1" stop-color="#ffb45c"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#10373d"/>
      <stop offset="1" stop-color="#0b2229"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#6dd8c8" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1280" height="430" rx="32" fill="url(#bg)"/>
  <rect width="1280" height="430" rx="32" fill="url(#grid)"/>
  <circle cx="1090" cy="75" r="170" fill="#f5a84a" opacity="0.10"/>
  <circle cx="146" cy="360" r="230" fill="#35d1be" opacity="0.10"/>

  <g transform="translate(70 70)">
    <text x="0" y="0" fill="#eafff8" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="78" font-weight="800" letter-spacing="-2">WOD2Sim</text>
    <text x="4" y="48" fill="#bceee3" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="24" font-weight="600">WOD-style policy adapters for AlpaSim closed-loop evidence</text>
    <text x="4" y="90" fill="#dffcf4" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="18">Installable package. Public CLI. Reproduction manifests. Audit JSON. Support bundles.</text>
  </g>

  <g transform="translate(78 230)">
    <rect x="0" y="0" width="205" height="96" rx="20" fill="url(#card)" stroke="#52d9c6" stroke-opacity="0.45"/>
    <text x="24" y="38" fill="#eafff8" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="18" font-weight="700">WOD signal</text>
    <text x="24" y="67" fill="#a8ded5" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="14">scene ids, ego pose, camera timing</text>

    <rect x="260" y="0" width="205" height="96" rx="20" fill="url(#card)" stroke="#52d9c6" stroke-opacity="0.45"/>
    <text x="284" y="38" fill="#eafff8" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="18" font-weight="700">Policy adapter</text>
    <text x="284" y="67" fill="#a8ded5" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="14">spotlight, token BC, direct planner</text>

    <rect x="520" y="0" width="205" height="96" rx="20" fill="url(#card)" stroke="#52d9c6" stroke-opacity="0.45"/>
    <text x="544" y="38" fill="#eafff8" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="18" font-weight="700">AlpaSim driver</text>
    <text x="544" y="67" fill="#a8ded5" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="14">external-driver closed loop</text>

    <rect x="780" y="0" width="205" height="96" rx="20" fill="url(#card)" stroke="#ffbd68" stroke-opacity="0.55"/>
    <text x="804" y="38" fill="#fff4df" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="18" font-weight="700">Evidence bundle</text>
    <text x="804" y="67" fill="#f7d5a6" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="14">manifest, audit, support archive</text>

    <path d="M214 48 H250" stroke="url(#lane)" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M474 48 H510" stroke="url(#lane)" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M734 48 H770" stroke="url(#lane)" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  </g>

  <g transform="translate(1010 218)">
    <rect x="0" y="0" width="192" height="118" rx="24" fill="#fff3d2" opacity="0.98"/>
    <text x="24" y="42" fill="#173333" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="28" font-weight="800">199</text>
    <text x="82" y="42" fill="#2a504b" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="16" font-weight="700">frames audited</text>
    <text x="24" y="75" fill="#173333" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="28" font-weight="800">0</text>
    <text x="56" y="75" fill="#2a504b" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="16" font-weight="700">sensor failures</text>
    <text x="24" y="101" fill="#476761" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="13">recorded local evidence summary</text>
  </g>
</svg>
