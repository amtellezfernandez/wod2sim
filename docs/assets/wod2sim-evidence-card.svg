<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="430" viewBox="0 0 1280 430" role="img" aria-labelledby="title desc">
  <title id="title">WOD2Sim evidence card</title>
  <desc id="desc">Evidence artifacts produced by a valid WOD2Sim closed-loop run.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f9faf2"/>
      <stop offset="1" stop-color="#dfeee7"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#15332f" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1280" height="430" rx="30" fill="url(#bg)"/>
  <text x="64" y="70" fill="#123431" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="40" font-weight="800">Evidence contract</text>
  <text x="64" y="103" fill="#4d6c62" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="18">A benchmark claim is only valid when all required artifacts agree.</text>

  <g transform="translate(66 150)" filter="url(#shadow)">
    <rect x="0" y="0" width="260" height="170" rx="24" fill="#123431"/>
    <text x="26" y="47" fill="#f7fff7" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="22" font-weight="800">Manifest</text>
    <text x="26" y="83" fill="#bde9dc" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="15">command plan</text>
    <text x="26" y="111" fill="#bde9dc" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="15">git + runtime provenance</text>
    <text x="26" y="139" fill="#bde9dc" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="15">claim boundary flag</text>
  </g>

  <g transform="translate(370 150)" filter="url(#shadow)">
    <rect x="0" y="0" width="260" height="170" rx="24" fill="#0c766f"/>
    <text x="26" y="47" fill="#f7fff7" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="22" font-weight="800">Run audit</text>
    <text x="26" y="83" fill="#d5fff1" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="15">driver log summary</text>
    <text x="26" y="111" fill="#d5fff1" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="15">sensor freshness checks</text>
    <text x="26" y="139" fill="#d5fff1" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="15">frame/result counts</text>
  </g>

  <g transform="translate(674 150)" filter="url(#shadow)">
    <rect x="0" y="0" width="260" height="170" rx="24" fill="#d97928"/>
    <text x="26" y="47" fill="#fff9ed" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="22" font-weight="800">Support bundle</text>
    <text x="26" y="83" fill="#fff0d2" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="15">logs + configs</text>
    <text x="26" y="111" fill="#fff0d2" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="15">normalized audit export</text>
    <text x="26" y="139" fill="#fff0d2" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="15">local SHA256 hash</text>
  </g>

  <g transform="translate(978 150)" filter="url(#shadow)">
    <rect x="0" y="0" width="236" height="170" rx="24" fill="#f2bf48"/>
    <text x="24" y="47" fill="#173333" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="22" font-weight="800">Benchmark JSON</text>
    <text x="24" y="83" fill="#3e5047" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="15">multi-run aggregate</text>
    <text x="24" y="111" fill="#3e5047" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="15">strict validation</text>
    <text x="24" y="139" fill="#3e5047" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="15">publishable summary</text>
  </g>

  <path d="M332 235 H360 M636 235 H664 M940 235 H968" stroke="#123431" stroke-width="5" stroke-linecap="round"/>
  <g transform="translate(282 356)">
    <rect x="0" y="0" width="716" height="44" rx="22" fill="#ffffff" opacity="0.9"/>
    <text x="34" y="29" fill="#123431" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="17" font-weight="800">Current recorded local summary: 1 scene, 199 audited frames, 0 sensor failures.</text>
  </g>
</svg>
