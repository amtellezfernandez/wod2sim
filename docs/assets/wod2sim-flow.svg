<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" role="img" aria-labelledby="title desc">
  <title id="title">WOD2Sim workflow diagram</title>
  <desc id="desc">Plan-only public workflow and gated closed-loop execution workflow.</desc>
  <defs>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fbf3"/>
      <stop offset="1" stop-color="#e9f1df"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#0e756c"/>
      <stop offset="1" stop-color="#dd7f2b"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#173333" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1280" height="560" rx="30" fill="url(#paper)"/>
  <path d="M 0 120 C 230 66 380 170 615 112 C 840 57 992 76 1280 32 L 1280 0 L 0 0 Z" fill="#10373d"/>
  <text x="64" y="72" fill="#f8fff6" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="38" font-weight="800">Two paths: public command review, gated closed-loop evidence</text>

  <g transform="translate(70 166)">
    <rect x="0" y="0" width="520" height="300" rx="28" fill="#ffffff" filter="url(#shadow)"/>
    <text x="34" y="48" fill="#10373d" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="26" font-weight="800">Public path</text>
    <text x="34" y="82" fill="#527064" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="16">No AlpaSim checkout or gated scene cache required.</text>
    <rect x="34" y="116" width="452" height="54" rx="16" fill="#e8f5ef"/>
    <text x="58" y="149" fill="#0d5f58" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="18" font-weight="700">wod2sim-doctor</text>
    <rect x="34" y="186" width="452" height="54" rx="16" fill="#e8f5ef"/>
    <text x="58" y="219" fill="#0d5f58" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="18" font-weight="700">wod2sim-reproduce --scene-id demo-scene</text>
    <text x="58" y="261" fill="#527064" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="15">Output: command manifest with valid_claim_evidence=false</text>
  </g>

  <g transform="translate(690 166)">
    <rect x="0" y="0" width="520" height="300" rx="28" fill="#ffffff" filter="url(#shadow)"/>
    <text x="34" y="48" fill="#10373d" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="26" font-weight="800">Closed-loop evidence path</text>
    <text x="34" y="82" fill="#527064" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="16">Requires local AlpaSim, Docker/GPU runtime, and user assets.</text>
    <rect x="34" y="116" width="452" height="54" rx="16" fill="#fff0db"/>
    <text x="58" y="149" fill="#ad5e16" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="18" font-weight="700">wod2sim-reproduce --execute</text>
    <rect x="34" y="186" width="452" height="54" rx="16" fill="#fff0db"/>
    <text x="58" y="219" fill="#ad5e16" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="18" font-weight="700">audit + support bundle + benchmark summary</text>
    <text x="58" y="261" fill="#527064" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="15">Output: publishable JSON summaries and local artifact hashes</text>
  </g>

  <path d="M602 318 C630 283 650 283 678 318" fill="none" stroke="url(#ink)" stroke-width="7" stroke-linecap="round"/>
  <circle cx="640" cy="318" r="18" fill="#10373d"/>
  <text x="632" y="325" fill="#ffffff" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="19" font-weight="800">?</text>

  <g transform="translate(150 498)">
    <text x="0" y="0" fill="#10373d" font-family="'Avenir Next','Gill Sans','Trebuchet MS',sans-serif" font-size="17" font-weight="700">Rule: public plans are useful for review, but only executed AlpaSim runs with valid audit and support bundle count as claim evidence.</text>
  </g>
</svg>
