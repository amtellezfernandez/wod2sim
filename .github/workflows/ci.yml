name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install package
        run: |
          uv sync --extra dev

      - name: Run static checks
        run: |
          make lint PYTHON='uv run python'

      - name: Run core conformance tier
        run: |
          make conformance PYTHON='uv run python'

      - name: Run tests with coverage
        run: |
          make coverage PYTHON='uv run python'

      - name: Run strict installed doctor
        run: |
          uv run wod2sim-doctor --strict-installed --json

      - name: Run fresh-checkout bootstrap smoke
        run: |
          make smoke PYTHON='uv run python'

      - name: Build package
        run: |
          uv run python -m build

      - name: Smoke test built wheel install
        run: |
          uv venv /tmp/wod2sim-wheel-smoke
          uv pip install --python /tmp/wod2sim-wheel-smoke/bin/python dist/*.whl
          /tmp/wod2sim-wheel-smoke/bin/wod2sim-doctor --strict-installed --json
          /tmp/wod2sim-wheel-smoke/bin/wod2sim-build-oracle-proxy --help > /dev/null
          /tmp/wod2sim-wheel-smoke/bin/wod2sim-audit-run --help > /dev/null
          /tmp/wod2sim-wheel-smoke/bin/wod2sim-support-bundle --help > /dev/null
          /tmp/wod2sim-wheel-smoke/bin/python - <<'PY'
          from pathlib import Path
          from wod2sim.cli.commands.run_alpasim_local_external import MODEL_PRESETS, SCENE_PRESETS
          from wod2sim.cli.commands.setup_alpasim_local_plugin import ALPASIM_OVERRIDE_ROOT

          assert tuple(MODEL_PRESETS) == (
              "constant_velocity",
              "route_following",
              "token_dagger_bc",
              "direct_actor_planner",
          ), tuple(MODEL_PRESETS)
          assert ALPASIM_OVERRIDE_ROOT.is_dir(), ALPASIM_OVERRIDE_ROOT
          assert all(Path(spec["config_file"]).is_file() for spec in MODEL_PRESETS.values())
          assert all(Path(path).is_file() for path in SCENE_PRESETS.values())
          print("wheel config and override payload OK")
          PY
          /tmp/wod2sim-wheel-smoke/bin/python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          wheel_path = next(Path("dist").glob("*.whl"))
          with ZipFile(wheel_path) as archive:
              bad_paths = [
                  name
                  for name in archive.namelist()
                  if "__pycache__/" in name or name.endswith((".pyc", ".pyo"))
              ]
          assert not bad_paths, bad_paths
          print("wheel artifact hygiene OK")
          PY
          printf 'command-materialization-smoke' > /tmp/wod2sim-token-checkpoint.pt
          /tmp/wod2sim-wheel-smoke/bin/wod2sim-batch \
            --mode print \
            --model token_dagger_bc \
            --checkpoint /tmp/wod2sim-token-checkpoint.pt \
            --scene-limit 1 \
            --batch-dir /tmp/wod2sim-wheel-batch
          test -f /tmp/wod2sim-wheel-batch/batch-status.json

      - name: Check tracked-file hygiene
        run: |
          if git ls-files | grep -E '(__pycache__/|\.pyc$|\.egg-info/)'; then
            echo "Tracked generated artifacts detected"
            exit 1
          fi
          test -z "$(git status --porcelain)"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wod2sim-dist
          path: dist/*
